<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>StealMyFinds Admin</title>

<style>

body {

  font-family: Arial;

  background: #fafafa;

  padding: 20px;

}

form {

  background: white;

  border: 3px solid black;

  padding: 20px;

  max-width: 700px;

}

label {

  display: block;

  margin-top: 16px;

  font-weight: bold;

}

input,
textarea,
select {

  width: 100%;

  padding: 12px;

  margin-top: 6px;

  border: 2px solid black;

}

button {

  margin-top: 20px;

  background: black;

  color: yellow;

  border: none;

  padding: 14px 18px;

  font-weight: bold;

  cursor: pointer;

}

.image-row {

  display: flex;

  gap: 10px;

  margin-top: 10px;

}

.image-row input {
  flex: 1;
}

.remove-btn {

  background: red;

  color: white;

}

.admin-products {

  margin-top: 40px;

  display: grid;

  grid-template-columns:
    repeat(auto-fill,minmax(220px,1fr));

  gap: 20px;

}

.admin-card {

  background: white;

  border: 3px solid black;

  padding: 14px;

}

.admin-card img {

  width: 100%;

  height: 160px;

  object-fit: cover;

}

.admin-actions {

  display: flex;

  gap: 10px;

}

.delete-btn {

  background: red;

}

/* 🍞 TOAST */
.toast {

  position: fixed;

  bottom: 20px;

  right: 20px;

  background: black;

  color: yellow;

  border: 3px solid yellow;

  padding: 14px 18px;

  font-weight: bold;

  z-index: 999999;

  opacity: 0;

  transform: translateY(20px);

  transition:
    opacity 0.25s ease,
    transform 0.25s ease;

}

.toast.show {

  opacity: 1;

  transform: translateY(0);

}

</style>
</head>

<body>

<h1>STEALMYFINDS ADMIN</h1>

<form id="productForm">

  <input type="hidden"
         id="editId">

  <label>Product Name</label>

  <input type="text"
         id="name"
         required>

  <label>Discounted Price</label>

  <input type="number"
         id="price"
         step="0.01"
         required>

  <label>Original Price</label>

  <input type="number"
         id="originalPrice"
         step="0.01">

  <label>Category</label>

  <select id="category">

    <option>
      Electronics & Gadgets
    </option>

    <option>
      Fashion & Beauty
    </option>

    <option>
      Home & Kitchen
    </option>

    <option>
      Health & Fitness
    </option>

    <option>
      Toys & Games
    </option>

  </select>

  <label>Description</label>

  <textarea id="description"></textarea>

  <label>Link</label>

  <input type="url"
         id="link">

  <label>Deal Of The Day</label>

  <select id="deal">

    <option value="false">
      No
    </option>

    <option value="true">
      Yes
    </option>

  </select>

  <label>Images</label>

  <div id="imageContainer">

    <div class="image-row">

      <input type="url"
             class="image-input"
             placeholder="Image URL">

      <button type="button"
              class="remove-btn">
        Remove
      </button>

    </div>

  </div>

  <button type="button"
          id="addImageBtn">

    Add More Images

  </button>

  <br>

  <button type="submit">

    SAVE PRODUCT

  </button>

</form>

<div id="adminProducts"
     class="admin-products">
</div>

<!-- 🍞 TOAST -->
<div id="toast"
     class="toast">
</div>

<script type="module"
        src="js/admin.js"></script>

</body>
</html>
