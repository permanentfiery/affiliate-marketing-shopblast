<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StealMyFinds Admin</title>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  padding: 20px;
}

.box {
  max-width: 600px;
  margin: auto;
  border: 3px solid black;
  padding: 20px;
  background: white;
}

input,
select,
textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border: 2px solid black;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

button {
  padding: 10px 14px;
  border: 2px solid black;
  background: black;
  color: yellow;
  cursor: pointer;
  font-weight: bold;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease;
}

button:hover {
  transform: translate(-3px, -3px);

  box-shadow:
    3px 3px 0 black;
}

button:active {
  transform: translate(-1px, -1px);

  box-shadow:
    1px 1px 0 black;
}

.product-item {
  border: 2px solid black;
  padding: 12px;
  margin-top: 12px;
}

.imageInput {
  margin-bottom: 10px;
}

#addImageBtn {
  margin-bottom: 16px;
}

.preview-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}

.preview-grid img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border: 2px solid black;
}

.section-title {
  margin-top: 24px;
}
</style>
</head>

<body>

<div class="box">

  <h1>STEALMYFINDS ADMIN</h1>

  <!-- 🔐 LOGIN -->
  <div id="loginBox">

    <input id="email"
           placeholder="Email">

    <input id="password"
           type="password"
           placeholder="Password">

    <button id="loginBtn">
      Login
    </button>

  </div>

  <!-- 🛍 ADMIN PANEL -->
  <div id="adminPanel"
       style="display:none;">

    <h2>Add / Edit Product</h2>

    <!-- PRODUCT NAME -->
    <input id="name"
           placeholder="Product Name">

    <!-- PRICE -->
    <input id="price"
           placeholder="Price in rupees">

    <!-- AFFILIATE LINK -->
    <input id="link"
           placeholder="Affiliate Link">

    <!-- DESCRIPTION -->
    <textarea id="description"
              placeholder="Description"></textarea>

    <!-- 🧭 CATEGORY -->
    <select id="category">

      <option value="Electronics & Gadgets">
        Electronics & Gadgets
      </option>

      <option value="Fashion & Beauty">
        Fashion & Beauty
      </option>

      <option value="Home & Kitchen">
        Home & Kitchen
      </option>

      <option value="Health & Fitness">
        Health & Fitness
      </option>

      <option value="Books & Courses">
        Books & Courses
      </option>

    </select>

    <!-- 🔥 DEAL -->
    <select id="deal">

      <option value="no">
        Normal Product
      </option>

      <option value="yes">
        🔥 Deal Product
      </option>

    </select>

    <!-- 🖼 MULTI IMAGE UPLOAD -->
    <h3 class="section-title">
      Product Images
    </h3>

    <div id="imageInputs">

      <input type="file"
             class="imageInput"
             accept="image/*">

    </div>

    <button type="button"
            id="addImageBtn">
      + Add More Images
    </button>

    <!-- 🖼 IMAGE PREVIEWS -->
    <div id="previewGrid"
         class="preview-grid"></div>

    <!-- 💾 SAVE -->
    <button id="saveBtn">
      Save Product
    </button>

    <!-- 🚪 LOGOUT -->
    <button id="logoutBtn"
            style="
              background:red;
              color:white;
              margin-left:10px;
            ">
      Logout
    </button>

    <hr>

    <!-- 📦 PRODUCTS -->
    <h2 class="section-title">
      Existing Products
    </h2>

    <div id="productList"></div>

  </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
