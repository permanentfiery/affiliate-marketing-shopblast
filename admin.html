<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StealMyFinds Admin</title>

<style>
body {
  font-family: Arial;
  background: #fafafa;
  padding: 20px;
}

.box {
  max-width: 500px;
  margin: auto;
  border: 3px solid black;
  padding: 20px;
  background: white;
}

input,
select,
textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  padding: 10px 14px;
  border: 2px solid black;
  background: black;
  color: yellow;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  transform: translate(-3px, -3px);
  box-shadow: 3px 3px 0 black;
}

.product-item {
  border: 2px solid black;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">

  <h1>STEALMYFINDS ADMIN</h1>

  <!-- LOGIN -->
  <div id="loginBox">

    <input id="email" placeholder="Email">

    <input id="password"
           type="password"
           placeholder="Password">

    <button id="loginBtn">
      Login
    </button>

  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none;">

    <h2>Add / Edit Product</h2>

    <input id="name" placeholder="Product Name">

    <input id="price"
           placeholder="Price in rupees">

    <input id="link"
           placeholder="Affiliate Link">

    <input id="image"
           placeholder="Image URL">

    <textarea id="description"
              placeholder="Description"></textarea>

    <!-- 🧭 CATEGORY -->
    <select id="category">

      <option value="Electronics & Gadgets">
        Electronics & Gadgets
      </option>

      <option value="Fashion & Beauty">
        Fashion & Beauty
      </option>

      <option value="Home & Kitchen">
        Home & Kitchen
      </option>

      <option value="Health & Fitness">
        Health & Fitness
      </option>

      <option value="Books & Courses">
        Books & Courses
      </option>

    </select>

    <!-- 🔥 DEAL -->
    <select id="deal">

      <option value="no">
        Normal Product
      </option>

      <option value="yes">
        🔥 Deal Product
      </option>

    </select>

    <button id="saveBtn">
      Save Product
    </button>

    <button id="logoutBtn"
            style="background:red;color:white;">
      Logout
    </button>

    <hr>

    <h2>Existing Products</h2>

    <div id="productList"></div>

  </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
