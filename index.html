<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StealMyFinds</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fafafa;
}

.nav {
  background: black;
  color: yellow;
  padding: 16px;
}

.hero {
  background: #FFD600;
  padding: 30px 20px;
  border-bottom: 3px solid black;
}

.deal {
  background: red;
  color: white;
  padding: 20px;
  margin: 20px;
  border: 3px solid black;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 20px;
  padding: 20px;
}

.card,
.deal-card {
  background: white;
  border: 3px solid black;

  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease;

  cursor: pointer;
}

.card {
  padding: 15px;
}

.deal-card {
  padding: 10px;
  width: 180px;
  text-align: center;
}

.card:hover,
.deal-card:hover {
  transform: translate(-6px, -6px);

  box-shadow:
    6px 6px 0px black;
}

.card:active,
.deal-card:active {
  transform: translate(-2px, -2px);

  box-shadow:
    2px 2px 0px black;
}

.deal-card h4,
.deal-card p {
  color: black;
}

.buy,
.deal-card .buy {
  background: black;
  color: yellow;
  padding: 10px 14px;
  display: inline-block;
  text-decoration: none;
  font-weight: bold;
  border: 2px solid black;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background 0.15s ease,
    color 0.15s ease;
}

.buy:hover,
.deal-card .buy:hover {
  transform: translate(-4px, -4px) scale(1.05);

  box-shadow:
    4px 4px 0px black;

  background: yellow;
  color: black;
}

.buy:active,
.deal-card .buy:active {
  transform: translate(-1px, -1px) scale(0.98);

  box-shadow:
    1px 1px 0px black;
}

/* 🧭 CATEGORY TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 0 20px 20px;
  flex-wrap: wrap;
}

.tab {
  border: 2px solid black;
  background: white;
  padding: 10px 14px;
  cursor: pointer;
  font-weight: bold;

  width: 140px;
  height: 46px;

  display: flex;
  align-items: center;
  justify-content: center;

  overflow: hidden;

  transition:
    width 0.25s ease,
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background 0.15s ease,
    color 0.15s ease;
}

/* text wrapper */
.tab span {
  display: inline-block;

  white-space: nowrap;

  transform: translateX(-15px);

  transition:
    transform 0.25s ease,
    opacity 0.25s ease;

  opacity: 0.75;
}

/* 🔥 HOVER */
.tab:hover {
  width: 240px;

  transform: translate(-3px, -3px);

  box-shadow:
    3px 3px 0 black;
}

.tab:hover span {
  transform: translateX(0px);

  opacity: 1;
}

.tab.active {
  background: black;
  color: yellow;
}
/* 🪟 MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);

  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 20px;
  border: 3px solid black;
  width: 320px;
  text-align: center;
}

.modal-content img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 24px;
}
</style>
</head>

<body>

<div class="nav">
  <h1>STEALMYFINDS</h1>
</div>

<div class="hero">
  <h2>
    Deals | links | shopping <br>
    Come steal my finds 🎀
  </h2>
</div>

<!-- 🔥 DEAL SECTION -->
<div id="dealSection"></div>

<!-- 🧭 CATEGORY TABS -->
<div id="categoryTabs" class="tabs">

  <button class="tab active"
          data-category="All">
    All
  </button>

  <button class="tab"
          data-category="Electronics & Gadgets">
    Electronics & Gadgets
  </button>

  <button class="tab"
          data-category="Fashion & Beauty">
    Fashion & Beauty
  </button>

  <button class="tab"
          data-category="Home & Kitchen">
    Home & Kitchen
  </button>

  <button class="tab"
          data-category="Health & Fitness">
    Health & Fitness
  </button>

  <button class="tab"
          data-category="Books & Courses">
    Books & Courses
  </button>

</div>

<!-- 🔍 SEARCH -->
<input id="searchInput"
       placeholder="Search products..."
       style="margin:20px;padding:10px;">

<!-- 🛍 PRODUCTS -->
<div id="productGrid" class="grid"></div>

<!-- 🪟 PRODUCT MODAL -->
<div id="productModal" class="modal hidden">

  <div class="modal-content">

    <span id="closeModal"
          class="close">
      &times;
    </span>

    <img id="modalImg" src="">

    <h2 id="modalName"></h2>

    <p id="modalPrice"></p>

    <p id="modalDesc"></p>

    <a id="modalLink"
       target="_blank"
       class="buy">
      BUY NOW
    </a>

  </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
