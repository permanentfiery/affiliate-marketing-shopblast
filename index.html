<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StealMyFinds</title>

<link rel="stylesheet" href="css/styles.css">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fafafa;
}

.nav {
  background: black;
  color: yellow;
  padding: 16px;
}

.hero {
  background: #FFD600;
  padding: 30px 20px;
  border-bottom: 3px solid black;
}

.deal {
  background: red;
  color: white;
  padding: 20px;
  margin: 20px;
  border: 3px solid black;
}

.deal-card {
  background: white;
  border: 2px solid black;
  padding: 10px;
  width: 180px;
  text-align: center;
}

.deal-card h4,
.deal-card p {
  color: black;
}

.deal-card .buy {
  background: black;
  color: yellow;
  padding: 8px;
  text-decoration: none;
  display: inline-block;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  border: 3px solid black;
  padding: 15px;
  background: white;
  cursor: pointer;
}

.buy {
  background: black;
  color: yellow;
  padding: 8px;
  display: inline-block;
  text-decoration: none;
}

/* 🪟 MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 20px;
  border: 3px solid black;
  width: 320px;
  text-align: center;
}

.modal-content img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 24px;
}
</style>
</head>

<body>

<div class="nav">
  <h1>STEALMYFINDS</h1>
</div>

<div class="hero">
  <h2>
    Deals | links | shopping <br>
    Come steal my finds 🎀
  </h2>
</div>

<!-- 🔥 DEALS -->
<div id="dealSection"></div>

<!-- 🔍 SEARCH -->
<input id="searchInput"
       placeholder="Search products..."
       style="margin:20px;padding:10px;">

<!-- 🛍 PRODUCTS -->
<div id="productGrid" class="grid"></div>

<!-- 🪟 PRODUCT MODAL -->
<div id="productModal" class="modal hidden">
  <div class="modal-content">

    <span id="closeModal" class="close">&times;</span>

    <img id="modalImg" src="">

    <h2 id="modalName"></h2>

    <p id="modalPrice"></p>

    <p id="modalDesc"></p>

    <a id="modalLink"
       target="_blank"
       class="buy">
       BUY NOW
    </a>

  </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
