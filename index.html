<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StealMyFinds</title>

<link rel="stylesheet" href="css/styles.css">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fafafa;
}

.nav {
  background: black;
  color: yellow;
  padding: 16px;
}

.hero {
  background: #FFD600;
  padding: 30px 20px;
  border-bottom: 3px solid black;
}

.hero h2 {
  margin: 0;
  font-size: 28px;
  line-height: 1.4;
}

.deal {
  background: red;
  color: white;
  padding: 20px;
  margin: 20px;
  border: 3px solid black;
}

.deal img {
  width: 120px;
  height: 120px;
  object-fit: cover;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  border: 3px solid black;
  padding: 15px;
  background: white;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.buy {
  background: black;
  color: yellow;
  padding: 8px;
  display: inline-block;
  text-decoration: none;
}

.search-box {
  margin: 20px;
}

.search-box input {
  padding: 10px;
  width: 250px;
}
</style>
</head>

<body>

<div class="nav">
  <h1>STEALMYFINDS</h1>
</div>

<!-- 🔥 HERO SECTION WITH TAGLINE -->
<div class="hero">
  <h2>
    Deals | links | shopping <br>
    Come steal my finds 🎀
  </h2>
</div>

<!-- 🔥 DEAL SECTION -->
<div id="dealSection"></div>

<!-- 🔍 SEARCH -->
<div class="search-box">
  <input id="searchInput" placeholder="Search products...">
</div>

<!-- 🛍 PRODUCTS -->
<div id="productGrid" class="grid"></div>

<script type="module" src="js/app.js"></script>

</body>
</html>
