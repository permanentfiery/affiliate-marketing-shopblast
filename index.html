<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StealMyFinds</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'DM Sans'; margin:0; background:#fafafa; }

.nav {
  background:black;
  color:white;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav h1 { font-family:'Bebas Neue'; color:#FFD600; }

.hero {
  background:#FFD600;
  padding:40px;
}

.search-bar input {
  padding:12px;
  width:300px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  border:3px solid black;
  background:white;
  padding:10px;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.buy {
  background:black;
  color:#FFD600;
  padding:8px;
  display:inline-block;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="nav">
  <h1>StealMyFinds</h1>
</div>

<section class="hero">
  <h2>Find the best products</h2>
  <div class="search-bar">
    <input id="searchInput" placeholder="Search products...">
  </div>
</section>

<div id="productGrid" class="grid"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
