<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StealMyFinds</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fafafa;
}

.nav {
  background: black;
  color: yellow;
  padding: 16px;
}

.hero {
  background: #FFD600;
  padding: 30px 20px;
  border-bottom: 3px solid black;

  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 30px;
  flex-wrap: wrap;
}

.hero h2 {
  margin: 0;
  line-height: 1.4;
}

.hero-search {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.hero-search input {
  width: 320px;
  max-width: 100%;

  padding: 14px 16px;

  border: 3px solid black;

  font-size: 15px;
  font-weight: bold;

  outline: none;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease;
}

.hero-search input:focus {

  transform: translate(-3px, -3px);

  box-shadow:
    3px 3px 0 black;

}

/* 🔍 SEARCH BUTTON */
.search-btn {
  background: black;
  color: yellow;

  border: 3px solid black;

  padding: 14px 20px;

  font-weight: bold;
  font-size: 15px;

  cursor: pointer;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background 0.15s ease,
    color 0.15s ease;
}

.search-btn:hover {

  transform:
    translate(-4px, -4px)
    scale(1.03);

  box-shadow:
    4px 4px 0px black;

  background: yellow;
  color: black;

}

.search-btn:active {

  transform:
    translate(-1px, -1px)
    scale(0.98);

  box-shadow:
    1px 1px 0px black;

}

.deal {
  background: red;
  color: white;
  padding: 20px;
  margin: 20px;
  border: 3px solid black;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 20px;
  padding: 20px;
}

.card,
.deal-card {
  background: white;
  border: 3px solid black;

  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease;

  cursor: pointer;
}

.card {
  padding: 15px;
}

.deal-card {
  padding: 10px;
  width: 180px;
  text-align: center;
}

.card:hover,
.deal-card:hover {

  transform: translate(-6px, -6px);

  box-shadow:
    6px 6px 0px black;

}

.card:active,
.deal-card:active {

  transform: translate(-2px, -2px);

  box-shadow:
    2px 2px 0px black;

}

.deal-card h4,
.deal-card p {
  color: black;
}

.buy,
.deal-card .buy {
  background: black;
  color: yellow;

  padding: 10px 14px;

  display: inline-block;

  text-decoration: none;

  font-weight: bold;

  border: 2px solid black;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background 0.15s ease,
    color 0.15s ease;
}

.buy:hover,
.deal-card .buy:hover {

  transform:
    translate(-4px, -4px)
    scale(1.05);

  box-shadow:
    4px 4px 0px black;

  background: yellow;
  color: black;

}

.buy:active,
.deal-card .buy:active {

  transform:
    translate(-1px, -1px)
    scale(0.98);

  box-shadow:
    1px 1px 0px black;

}

/* 🧭 CATEGORY TABS */
.tabs {
  display: flex;
  gap: 14px;
  padding: 0 20px 24px;
  flex-wrap: wrap;
}

.tab {
  min-width: 170px;
  height: 54px;

  padding: 0 22px;

  border: 3px solid black;
  background: white;

  display: flex;
  align-items: center;
  justify-content: center;

  text-align: center;

  font-size: 15px;
  font-weight: 700;

  cursor: pointer;

  transition:
    min-width 0.25s ease,
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background 0.15s ease,
    color 0.15s ease;

  white-space: nowrap;
}

.tab:hover {

  min-width: 240px;

  transform: translate(-4px, -4px);

  box-shadow:
    4px 4px 0px black;

}

.tab.active {
  background: black;
  color: yellow;
}

/* 🪟 MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.6);

  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 20px;
  border: 3px solid black;
  width: 340px;
  text-align: center;
}

.modal-content img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 24px;
}

/* 🖼 GALLERY */
#modalGallery {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.gallery-thumb {
  width: 60px;
  height: 60px;

  object-fit: cover;

  border: 2px solid black;

  cursor: pointer;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease;
}

.gallery-thumb:hover {

  transform: translate(-3px, -3px);

  box-shadow:
    3px 3px 0 black;

}

@media (max-width: 700px) {

  .hero {
    flex-direction: column;
    align-items: flex-start;
  }

  .hero-search {
    width: 100%;
  }

  .hero-search input {
    flex: 1;
    width: 100%;
  }

}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">

  <h1>STEALMYFINDS</h1>

</div>

<!-- HERO -->
<div class="hero">

  <h2>
    Deals | links | shopping <br>
    Come steal my finds 🎀
  </h2>

  <!-- 🔍 SEARCH -->
  <div class="hero-search">

    <input id="searchInput"
           placeholder="Search products...">

    <button id="searchBtn"
            class="search-btn">
      Search
    </button>

  </div>

</div>

<!-- 🔥 DEALS -->
<div id="dealSection"></div>

<!-- 🧭 CATEGORIES -->
<div id="categoryTabs"
     class="tabs">

  <button class="tab active"
          data-category="All">
    All
  </button>

  <button class="tab"
          data-category="Electronics & Gadgets">
    Electronics & Gadgets
  </button>

  <button class="tab"
          data-category="Fashion & Beauty">
    Fashion & Beauty
  </button>

  <button class="tab"
          data-category="Home & Kitchen">
    Home & Kitchen
  </button>

  <button class="tab"
          data-category="Health & Fitness">
    Health & Fitness
  </button>

  <button class="tab"
          data-category="Books & Courses">
    Books & Courses
  </button>

</div>

<!-- 🛍 PRODUCTS -->
<div id="productGrid"
     class="grid"></div>

<!-- 🪟 MODAL -->
<div id="productModal"
     class="modal hidden">

  <div class="modal-content">

    <span id="closeModal"
          class="close">
      &times;
    </span>

    <img id="modalImg" src="">

    <div id="modalGallery"></div>

    <h2 id="modalName"></h2>

    <p id="modalPrice"></p>

    <p id="modalDesc"></p>

    <a id="modalLink"
       target="_blank"
       class="buy">
      BUY NOW
    </a>

  </div>

</div>

<script type="module"
        src="js/app.js"></script>

</body>
</html>
