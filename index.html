<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>StealMyFinds</title>

<style>

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  background: #fafafa;
  transition:
    background 0.25s ease,
    color 0.25s ease;
}

/* 🧭 NAV */
.nav {
  background: black;
  color: yellow;
  padding: 16px 24px;
  position: relative;
  z-index: 2;
}

.nav h1 {
  margin: 0;
  font-size: 34px;
}

/* 🔥 HERO */
.hero {

  background: #FFD600;

  padding: 140px 24px 80px;

  border-bottom: 3px solid black;

  position: relative;

  overflow: hidden;

}

.hero-content {

  max-width: 720px;

  position: relative;

  z-index: 2;

}

.hero-tag {

  display: inline-block;

  background: black;

  color: yellow;

  padding: 8px 14px;

  font-size: 12px;

  font-weight: bold;

  letter-spacing: 4px;

  margin-bottom: 24px;

}

.hero-title {

  font-size: 92px;

  font-weight: 900;

  line-height: 0.9;

  margin: 0 0 24px;

  text-transform: uppercase;

}

.hero-sub {

  font-size: 20px;

  max-width: 620px;

  line-height: 1.5;

}

.hero-bg {

  position: absolute;

  right: 30px;

  top: 20px;

  font-size: 220px;

  font-weight: 900;

  color: rgba(0,0,0,0.05);

  line-height: 1;

  user-select: none;

  pointer-events: none;

}

/* 📱 SOCIALS */
.social-bar {

  display: flex;

  gap: 12px;

  align-items: center;

  margin-top: 30px;

  flex-wrap: wrap;

}

.social-btn {

  background: black;

  color: yellow;

  border: 3px solid black;

  padding: 12px 16px;

  text-decoration: none;

  font-weight: 900;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background 0.15s ease,
    color 0.15s ease;

}

.social-btn:hover {

  transform: translate(-4px,-4px);

  box-shadow:
    4px 4px 0 black;

  background: yellow;

  color: black;

}

/* 🔍 SEARCH */
.search-wrapper {

  position: fixed;

  top: 12px;

  left: 50%;

  transform: translateX(-50%);

  z-index: 9999;

  width: 620px;

  max-width: calc(100vw - 24px);

}

.hero-search {

  display: flex;

  align-items: stretch;

  width: 100%;

  border: 3px solid black;

  background: white;

  box-shadow:
    6px 6px 0 black;

}

.hero-search input {

  flex: 1;

  border: none;

  padding: 18px;

  font-size: 18px;

  font-weight: bold;

  outline: none;

  min-width: 0;

}

.search-btn {

  background: black;

  color: yellow;

  border: none;

  padding: 0 30px;

  font-size: 18px;

  font-weight: bold;

  cursor: pointer;

  transition:
    background 0.15s ease,
    color 0.15s ease;

}

.search-btn:hover {

  background: yellow;

  color: black;

}

/* 🔥 DEALS */


.deal h2 {
  margin-top: 0;
}

/* 🛍 GRID */
.grid {

  display: grid;

  grid-template-columns:
    repeat(auto-fill, minmax(220px,1fr));

  gap: 20px;

  padding: 20px;

}

/* 🃏 CARD */
.card {

  background: white;

  border: 3px solid black;

  padding: 15px;

  display: flex;

  flex-direction: column;

  justify-content: space-between;

  min-height: 520px;

  overflow: hidden;

  cursor: pointer;

  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease;

}

.card:hover {

  transform: translate(-6px, -6px);

  box-shadow:
    6px 6px 0 black;

}

.card img {

  width: 100%;

  height: 220px;

  object-fit: cover;

  display: block;

}

.card h3 {

  margin: 14px 0 10px;

  font-size: 17px;

  line-height: 1.35;

  height: 70px;

  overflow: hidden;

  display: -webkit-box;

  -webkit-line-clamp: 3;

  -webkit-box-orient: vertical;

}

.card p {

  margin: 8px 0;

}

/* 🟡 BUTTONS */
.buy {

  background: black;

  color: yellow;

  padding: 10px 14px;

  display: inline-block;

  text-decoration: none;

  font-weight: bold;

  border: 2px solid black;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background 0.15s ease,
    color 0.15s ease;

}

.buy:hover {

  transform:
    translate(-4px,-4px)
    scale(1.05);

  box-shadow:
    4px 4px 0 black;

  background: yellow;

  color: black;

}

/* 🧭 TABS */
.tabs {

  display: flex;

  gap: 14px;

  padding: 20px;

  flex-wrap: wrap;

}

.tab {

  min-width: 170px;

  height: 54px;

  padding: 0 22px;

  border: 3px solid black;

  background: white;

  display: flex;

  align-items: center;

  justify-content: center;

  font-size: 15px;

  font-weight: 700;

  cursor: pointer;

  white-space: nowrap;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease;

}

.tab:hover {

  transform: translate(-4px,-4px);

  box-shadow:
    4px 4px 0 black;

}

.tab.active {

  background: black;

  color: yellow;

}

/* 🪟 MODAL */
.modal {

  position: fixed;

  inset: 0;

  background: rgba(0,0,0,0.72);

  display: flex;

  justify-content: center;

  align-items: center;

  padding: 20px;

  z-index: 999999;

  backdrop-filter: blur(3px);

}

.hidden {
  display: none;
}

.modal-content {

  background: white;

  padding: 20px;

  border: 3px solid black;

  width: 620px;

  max-width: 95vw;

  max-height: 92vh;

  overflow-y: auto;

  position: relative;

}

.close {

  position: absolute;

  top: 10px;

  right: 14px;

  cursor: pointer;

  font-size: 28px;

}

/* 🎞 SLIDER */
.modal-slider {

  position: relative;

  overflow: hidden;

  border: 3px solid black;

  background: #f5f5f5;

}

.slider-track {

  display: flex;

  transition: transform 0.4s ease;

}

.slide {

  min-width: 100%;

  display: flex;

  justify-content: center;

  align-items: center;

  background: #f5f5f5;

  padding: 10px;

}

.slide img {

  width: 100%;

  height: auto;

  max-height: 70vh;

  object-fit: contain;

  display: block;

}

/* ⬅️➡️ BUTTONS */
.slider-nav {

  position: absolute;

  top: 50%;

  transform: translateY(-50%);

  background: rgba(0,0,0,0.82);

  color: yellow;

  border: 3px solid black;

  width: 52px;

  height: 52px;

  font-size: 24px;

  cursor: pointer;

  z-index: 99;

}

.prev-btn {
  left: 10px;
}

.next-btn {
  right: 10px;
}

/* 🔘 DOTS */
.slider-controls {

  display: flex;

  justify-content: center;

  gap: 10px;

  margin-top: 12px;

}

.slider-dot {

  width: 14px;

  height: 14px;

  border-radius: 50%;

  background: #ccc;

  border: 2px solid black;

  cursor: pointer;

}

.slider-dot.active {
  background: black;
}

/* 🌙 DARK MODE */
.theme-toggle {

  position: fixed;

  bottom: 20px;

  right: 20px;

  width: 58px;

  height: 58px;

  border-radius: 50%;

  border: 3px solid black;

  background: yellow;

  color: black;

  font-size: 24px;

  cursor: pointer;

  z-index: 999999;

}

body.dark {

  background: #111;

  color: white;

}

body.dark .nav {

  background: #000;

  color: yellow;

}

body.dark .hero {

  background: #181818;

  color: white;

}

body.dark .hero-tag {

  background: yellow;

  color: black;

}

body.dark .hero-bg {

  color: rgba(255,255,255,0.04);

}

body.dark .hero-search {

  background: #1f1f1f;

  border-color: yellow;

  box-shadow:
    6px 6px 0 yellow;

}

body.dark .hero-search input {

  background: #1f1f1f;

  color: white;

}

body.dark .search-btn {

  background: yellow;

  color: black;

}

body.dark .card,
body.dark .modal-content {

  background: #1b1b1b;

  color: white;

  border-color: yellow;

}

body.dark .buy {

  background: yellow;

  color: black;

}

body.dark .tab {

  background: #1b1b1b;

  color: white;

  border-color: yellow;

}

body.dark .tab.active {

  background: yellow;

  color: black;

}

body.dark .social-btn {

  background: yellow;

  color: black;

  border-color: yellow;

}

body.dark .social-btn:hover {

  background: black;

  color: yellow;

}

/* 📱 MOBILE */
@media (max-width: 768px) {

  .hero {
    padding: 120px 18px 40px;
  }

  .hero-title {
    font-size: 52px;
  }

  .hero-sub {
    font-size: 16px;
  }

  .search-wrapper {
    width: calc(100vw - 24px);
  }

  .grid {

    grid-template-columns:
      repeat(2, 1fr);

    gap: 12px;

    padding: 12px;

  }

  .card {
    min-height: 390px;
    padding: 10px;
  }

  .card img {
    height: 150px;
  }

  .tabs {
    overflow-x: auto;
    flex-wrap: nowrap;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar {
    display: none;
  }

  .tab {
    flex-shrink: 0;
    min-width: 150px;
  }

  .social-btn {

    font-size: 13px;

    padding: 10px 12px;

  }

}


/* ===== FIXED DEAL SECTION ===== */

.deal{
  background:#ff1111 !important;
  padding:24px !important;
}

.deals-grid{
  display:grid !important;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr)) !important;
  gap:24px !important;
  width:100% !important;
}

.deal-card{
  width:100% !important;
  max-width:none !important;
  background:#fff !important;
  border:3px solid #000 !important;
  padding:16px !important;
  display:flex !important;
  flex-direction:column !important;
  overflow:hidden !important;
  position:relative !important;
}

.deal-card img{
  width:100% !important;
  height:260px !important;
  object-fit:cover !important;
  display:block !important;
}

.deal-card h4{
  color:#000 !important;
  font-size:18px !important;
  line-height:1.4 !important;
  margin:14px 0 10px !important;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.deal-card p{
  color:#000 !important;
  margin-bottom:14px !important;
}

.discount-badge{
  position:absolute !important;
  top:10px !important;
  left:10px !important;
  background:#000 !important;
  color:yellow !important;
  padding:6px 10px !important;
  font-weight:bold !important;
}

.deal-card .buy{
  margin-top:auto !important;
}

@media(max-width:768px){

  .deals-grid{
    grid-template-columns:1fr !important;
  }

  .deal-card img{
    height:220px !important;
  }

}

</style>
</head>

<body>

<div class="nav">
  <h1>STEALMYFINDS</h1>
</div>

<div class="search-wrapper">

  <div class="hero-search">

    <input id="searchInput"
           placeholder="Search products, brands, categories...">

    <button id="searchBtn"
            class="search-btn">
      SEARCH
    </button>

  </div>

</div>

<div class="hero">

  <div class="hero-bg">
    HOT
  </div>

  <div class="hero-content">

    <div class="hero-tag">
      BEST DEALS CURATED DAILY
    </div>

    <h1 class="hero-title">
      COME STEAL <br>
      MY FINDS 🎀
    </h1>

    <p class="hero-sub">
      Top picks across Electronics,
      Fashion, Home, Health, Toys & More.
    </p>

    <div class="social-bar">

      <a class="social-btn"
         href="https://www.instagram.com/stealmyfinds/"
         target="_blank">
        Instagram
      </a>

      <a class="social-btn"
         href="https://www.facebook.com/profile.php?id=61589616925553"
         target="_blank">
        Facebook
      </a>

      <a class="social-btn"
         href="https://www.youtube.com/@stealmyfinds"
         target="_blank">
        YouTube
      </a>

      <a class="social-btn"
         href="https://www.threads.com/@stealmyfinds"
         target="_blank">
        Threads
      </a>

    </div>

  </div>

</div>

<div id="dealSection"></div>

<div id="categoryTabs"
     class="tabs">

  <button class="tab active"
          data-category="All">
    All
  </button>

  <button class="tab"
          data-category="Electronics & Gadgets">
    Electronics & Gadgets
  </button>

  <button class="tab"
          data-category="Fashion & Beauty">
    Fashion & Beauty
  </button>

  <button class="tab"
          data-category="Home & Kitchen">
    Home & Kitchen
  </button>

  <button class="tab"
          data-category="Health & Fitness">
    Health & Fitness
  </button>

  <button class="tab"
          data-category="Toys & Games">
    Toys & Games
  </button>

</div>

<div id="productGrid"
     class="grid"></div>

<div id="productModal"
     class="modal hidden">

  <div class="modal-content">

    <span id="closeModal"
          class="close">
      ×
    </span>

    <div class="modal-slider">

      <button class="slider-nav prev-btn"
              id="prevSlide">
        ‹
      </button>

      <div id="sliderTrack"
           class="slider-track">
      </div>

      <button class="slider-nav next-btn"
              id="nextSlide">
        ›
      </button>

    </div>

    <div id="sliderControls"
         class="slider-controls">
    </div>

    <h2 id="modalName"></h2>

    <p id="modalPrice"></p>

    <p id="modalDesc"></p>

    <a id="modalLink"
       target="_blank"
       class="buy">
      BUY NOW
    </a>

  </div>

</div>

<button id="themeToggle"
        class="theme-toggle">
  🌙
</button>

<script type="module"
        src="js/app.js"></script>

</body>
</html>
