<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>StealMyFinds</title>

<style>

* {
  box-sizing: border-box;
}

body {
  font-family: Arial;
  margin: 0;
  background: #fafafa;
  overflow-x: hidden;
}

/* 🧭 NAV */
.nav {
  background: black;
  color: yellow;

  padding: 16px 24px;
}

.nav h1 {
  margin: 0;
}

/* 🔥 SIMPLE HERO */
.hero {
  background: #FFD600;

  padding: 30px 24px;

  border-bottom: 3px solid black;
}

.hero h2 {
  margin-top: 0;

  font-size: 42px;

  line-height: 1.1;
}

.hero p {
  font-size: 18px;
}

/* 🔍 SEARCH */
.search-wrapper {
  padding: 20px 24px;

  position: sticky;

  top: 0;

  z-index: 999;

  background: #fafafa;
}

.hero-search {
  display: flex;

  align-items: stretch;

  width: 620px;
  max-width: 100%;

  border: 3px solid black;

  background: white;

  box-shadow:
    6px 6px 0 black;
}

.hero-search input {
  flex: 1;

  border: none;

  padding: 18px;

  font-size: 18px;
  font-weight: bold;

  outline: none;
}

.search-btn {
  background: black;
  color: yellow;

  border: none;

  padding: 0 30px;

  font-size: 18px;
  font-weight: bold;

  cursor: pointer;

  transition:
    background 0.15s ease,
    color 0.15s ease;
}

.search-btn:hover {

  background: yellow;
  color: black;

}

/* 🔥 DEALS */
.deal {
  background: red;
  color: white;

  padding: 20px;
  margin: 20px;

  border: 3px solid black;
}

/* 🛍 GRID */
.grid {
  display: grid;

  grid-template-columns:
    repeat(auto-fill, minmax(220px,1fr));

  gap: 20px;

  padding: 20px;
}

/* 🃏 CARDS */
.card,
.deal-card {

  background: white;

  border: 3px solid black;

  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease;

  cursor: pointer;

  overflow: hidden;
}

.card {
  padding: 15px;
}

.deal-card {
  padding: 10px;

  width: 180px;

  text-align: center;
}

.card:hover,
.deal-card:hover {

  transform: translate(-6px, -6px);

  box-shadow:
    6px 6px 0px black;

}

.card img,
.deal-card img {
  width: 100%;

  object-fit: cover;

  display: block;
}

.card img {
  height: 220px;
}

.deal-card img {
  height: 100px;
}

/* 🟡 BUTTONS */
.buy,
.deal-card .buy {
  background: black;
  color: yellow;

  padding: 10px 14px;

  display: inline-block;

  text-decoration: none;

  font-weight: bold;

  border: 2px solid black;

  transition:
    transform 0.15s ease,
    box-shadow 0.15s ease,
    background 0.15s ease,
    color 0.15s ease;
}

.buy:hover,
.deal-card .buy:hover {

  transform:
    translate(-4px, -4px)
    scale(1.05);

  box-shadow:
    4px 4px 0px black;

  background: yellow;
  color: black;

}

/* 🧭 CATEGORYS */
.tabs {
  display: flex;

  gap: 14px;

  padding: 20px;

  flex-wrap: wrap;
}

.tab {
  min-width: 170px;
  height: 54px;

  padding: 0 22px;

  border: 3px solid black;

  background: white;

  display: flex;
  align-items: center;
  justify-content: center;

  text-align: center;

  font-size: 15px;
  font-weight: 700;

  cursor: pointer;

  transition:
    min-width 0.25s ease,
    transform 0.15s ease,
    box-shadow 0.15s ease;

  white-space: nowrap;
}

.tab:hover {

  min-width: 240px;

  transform: translate(-4px, -4px);

  box-shadow:
    4px 4px 0px black;

}

.tab.active {
  background: black;
  color: yellow;
}

/* 🪟 MODAL */
.modal {
  position: fixed;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.6);

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 20px;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;

  padding: 20px;

  border: 3px solid black;

  width: 520px;

  max-width: 95vw;

  max-height: 92vh;

  overflow-y: auto;

  text-align: center;

  position: relative;
}

.close {
  float: right;

  cursor: pointer;

  font-size: 24px;
}

/* 🎞 SLIDER */
.modal-slider {
  position: relative;

  overflow: hidden;

  border: 3px solid black;

  background: #f2f2f2;
}

.slider-track {
  display: flex;

  transition: transform 0.4s ease;
}

.slide {
  min-width: 100%;
}

.slide img {
  width: 100%;
  height: 320px;

  object-fit: cover;

  display: block;
}

/* ⬅️➡️ SLIDER BUTTONS */
.slider-nav {
  position: absolute;

  top: 50%;

  transform: translateY(-50%);

  background: rgba(0,0,0,0.8);

  color: yellow;

  border: none;

  width: 44px;
  height: 44px;

  font-size: 20px;

  cursor: pointer;

  z-index: 5;
}

.prev-btn {
  left: 10px;
}

.next-btn {
  right: 10px;
}

/* 🔘 DOTS */
.slider-controls {
  display: flex;

  justify-content: center;

  gap: 10px;

  margin-top: 12px;
}

.slider-dot {
  width: 14px;
  height: 14px;

  border-radius: 50%;

  background: #ccc;

  border: 2px solid black;

  cursor: pointer;
}

.slider-dot.active {
  background: black;
}

@media (max-width: 700px) {

  .hero h2 {
    font-size: 30px;
  }

  .hero-search {
    flex-direction: column;
  }

  .search-btn {
    height: 60px;
  }

}

</style>
</head>

<body>

<!-- 🧭 NAV -->
<div class="nav">

  <h1>STEALMYFINDS</h1>

</div>

<!-- 🔥 HERO -->
<div class="hero">

  <h2>
    Deals | links | shopping <br>
    Come steal my finds 🎀
  </h2>

  <p>
    Top picks across Electronics,
    Fashion, Home, Health & More.
  </p>

</div>

<!-- 🔍 SEARCH -->
<div class="search-wrapper">

  <div class="hero-search">

    <input id="searchInput"
           placeholder="Search products, brands, categories...">

    <button id="searchBtn"
            class="search-btn">
      SEARCH
    </button>

  </div>

</div>

<!-- 🔥 DEALS -->
<div id="dealSection"></div>

<!-- 🧭 CATEGORYS -->
<div id="categoryTabs"
     class="tabs">

  <button class="tab active"
          data-category="All">
    All
  </button>

  <button class="tab"
          data-category="Electronics & Gadgets">
    Electronics & Gadgets
  </button>

  <button class="tab"
          data-category="Fashion & Beauty">
    Fashion & Beauty
  </button>

  <button class="tab"
          data-category="Home & Kitchen">
    Home & Kitchen
  </button>

  <button class="tab"
          data-category="Health & Fitness">
    Health & Fitness
  </button>

  <button class="tab"
          data-category="Books & Courses">
    Books & Courses
  </button>

</div>

<!-- 🛍 PRODUCTS -->
<div id="productGrid"
     class="grid"></div>

<!-- 🪟 MODAL -->
<div id="productModal"
     class="modal hidden">

  <div class="modal-content">

    <span id="closeModal"
          class="close">
      &times;
    </span>

    <!-- 🎞 SLIDER -->
    <div class="modal-slider">

      <button class="slider-nav prev-btn"
              id="prevSlide">
        ‹
      </button>

      <div id="sliderTrack"
           class="slider-track">
      </div>

      <button class="slider-nav next-btn"
              id="nextSlide">
        ›
      </button>

    </div>

    <!-- 🔘 DOTS -->
    <div id="sliderControls"
         class="slider-controls">
    </div>

    <h2 id="modalName"></h2>

    <p id="modalPrice"></p>

    <p id="modalDesc"></p>

    <a id="modalLink"
       target="_blank"
       class="buy">
      BUY NOW
    </a>

  </div>

</div>

<script type="module"
        src="js/app.js"></script>

</body>
</html>
